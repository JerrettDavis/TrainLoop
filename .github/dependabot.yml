# Keep dependency PRs grouped and delayed for at least 48 hours so newly published packages age before adoption.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    groups:
      nuget-dependencies:
        patterns:
          - "*"
    ignore:
      # Microsoft.OpenApi 3.x breaks Microsoft.AspNetCore.OpenApi 10.0.x source generation
      # (CS0200 on IOpenApiMediaType.Example). See TrainLoop.Api.csproj comment. Revisit
      # once a stable AspNetCore.OpenApi release supports Microsoft.OpenApi 3.x.
      - dependency-name: "Microsoft.OpenApi"
        versions: [">=3.0.0"]
